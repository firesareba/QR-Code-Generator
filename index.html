<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>QR Code Generator</title>
        <link href="https://fonts.cdnfonts.com/css/oldnewspapertypes" rel="stylesheet">
        <link rel="stylesheet" href="landingStyle.css">
    </head>
    <body>
        <div class="title-display container">
            <canvas id="code-canvas"></canvas>
            <h1 id="title">QR Code Generator</h1>
        </div>
        <div class="nav-holder container">
            <a href="./info.html">
                <button class="page-button">INFO PAGE</button>
            </a>
            <a href="./main.html">
                <button class="page-button">MAIN PAGE</button>
            </a>
        </div>

        <p id="check"><strong>IMPORTANT:</strong> Please check out the <strong>Info Page</strong></p>
    </body>
    <script src="script.js"></script>
    <script src="preGenCodes.js"></script>
    <script>
        const title = document.getElementById("title");

        let idxOptions = [];
        for (let i=0; i<pre_gen_codes.length; i++){
            idxOptions.push(i);
        }

        let idx = idxOptions[Math.floor(idxOptions.length*Math.random())];
        idxOptions = idxOptions.filter(x => x !== idx);
        idxOptions.push(idx);
        code_grid = pre_gen_codes[idx];
        displayCode();

        setInterval(() => {
            idx = idxOptions[Math.floor((idxOptions.length-1)*Math.random())];
            idxOptions = idxOptions.filter(x => x !== idx);
            idxOptions.push(idx);

            code_grid = pre_gen_codes[idx];
            zeroColor = "#ff00ff";
            oneColor = "#ffff00";
            title.style.fontFamily = "Impact,Charcoal,sans-serif"; 

            displayCode();
        }, 500);
    </script>
</html>
