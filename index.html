<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>QR Code Generator</title>
        <link href="https://fonts.cdnfonts.com/css/oldnewspapertypes" rel="stylesheet">
        <link rel="stylesheet" href="landingStyle.css">
    </head>
    <body>
        <div class="title-display container">
            <canvas id="code-canvas"></canvas>
            <h1 id="title">QR Code Generator</h1>
        </div>
        <div class="nav-holder container">
            <a href="./info.html">
                <button class="page-button">INFO PAGE</button>
            </a>
            <a href="./main.html">
                <button class="page-button">MAIN PAGE</button>
            </a>
        </div>

        <p id="check"><strong>IMPORTANT:</strong> Please check out the <strong>Info Page</strong></p>
    </body>
    <script src="script.js"></script>
    <script>
        function downloadTextFile(text) {
            var blob = new Blob([text], { type: 'text/plain' });
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "Code.txt";
            link.click();
        }


        let totalText = "";
        let version;
        let errorLevels = ["L", "M", "Q", "H"]
        for (let i=0; i<20; i++){
            version = Math.floor(Math.random() * 19) + 2;
            if (version == 2){
                errorLevel = errorLevels[Math.floor(Math.random() * 3)];
            } else{
                errorLevel = errorLevels[Math.floor(Math.random() * 4)];
            }
            let maskMethod = Math.floor(Math.random() * 8);
            generateCode("QR Code Generator", version, errorLevel, maskMethod);
            totalText += code_grid;
            totalText += "\n";
            totalText += "\n";
        }
        downloadTextFile(totalText);
    </script>
</html>
