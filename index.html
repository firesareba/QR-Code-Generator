<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>QR Code Generator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="settings-holder">
            <div>
                <label class="settings">Enter URL Here:</label>
                <input class="settings" id="url" type="text">
            </div>
            <div>
                <label class="settings">Mask version(0-7)</label>
                <input class="settings" id="mask" type="number" min="0" max="7" value="0">
            </div>
            <div>
                <label class="settings error-correction">L</label>
                <input class="settings error-correction" id="L" type="radio" name="error-correction" value="L" checked="true">
                <label class="settings error-correction">M</label>
                <input class="settings error-correction" id="M" type="radio" name="error-correction" value="M">
                <label class="settings error-correction">Q</label>
                <input class="settings error-correction" id="Q" type="radio" name="error-correction" value="Q">
                <label class="settings error-correction">H</label>
                <input class="settings error-correction" id="H" type="radio" name="error-correction" value="H">
            </div>
        </div>

        <canvas id="code-canvas"></canvas>
        <footer>
            *Instructions and <strong>SIMULATION</strong> on  <a href="./info.html">Information Page</a>
        </footer>
    </body>
    <script src="script.js"></script>
</html>
