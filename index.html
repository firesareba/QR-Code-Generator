<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>QR Code Generator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="settings-holder">
            <div>
                <label class="settings">Enter URL Here:</label>
                <input class="settings" id="url" type="text">
            </div>
            <div>
                <label class="settings">Mask version(0-7)</label>
                <input class="settings" id="mask" type="number" min="0" max="7" value="0">
            </div>
            <div>
                <label class="settings">Error Correction</label>
                <select id="error-correction">
                    <option value="L">Low (7%)</option>
                    <option value="M">Medium (15%)</option>
                    <option value="Q">Quartile (25%)</option>
                    <option value="H">High (30%)</option>
                </select>
            </div>
        </div>

        <canvas id="code-canvas"></canvas>
        <footer>
            *Instructions and <strong>SIMULATION</strong> on  <a href="./info.html">Information Page</a>
        </footer>
    </body>
    <script src="script.js"></script>
</html>
