<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>QR Code Generator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="input-holder">
            <div>
                <label class="input">Enter URL Here:</label>
                <input class="input" id="url" type="text">
            </div>

            <div>
                <label class="input">Mask version:</label>
                <input class="input" id="mask" type="number" min="0" max="7" value="0">
            </div>

            <div>
                <label class="input">Error Correction:</label>
                <select id="error-correction">
                    <option value="L">Low (7%)</option>
                    <option value="M">Medium (15%)</option>
                    <option value="Q">Quartile (25%)</option>
                    <option value="H">High (30%)</option>
                </select>
            </div>

            <div>
                <label class="input" id="version-label">Version: 2</label>
                <input class="input"id="version" type="range" min="1" max="40" value="2">
            </div>

            <div>
                <label class="input">Debug Mode:</label>
                <input class="input" id="debug" type="checkbox">
            </div>

            <div>
                <input class="input" id="download" type="button" value="Download">
            </div>

            <div>
                <input class="input" id="logo" type="file">
            </div>
            
            <div>
                <label class="input">Zero Color:</label>
                <input class="input" id="zeroBit" type="color" value="ffffff">
                <label class="input">One Color:</label>
                <input class="input" id="oneBit" type="color" value="#000000">
            </div>
        </div>

        <canvas id="code-canvas"></canvas>

        <footer>
            Breakdown on <a href="./info.html">Information Page</a>
        </footer>
    </body>
    <script src="script.js"></script>
</html>
