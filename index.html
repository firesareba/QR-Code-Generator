<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>QR Code Generator</title>
        <link href="https://fonts.cdnfonts.com/css/oldnewspapertypes" rel="stylesheet">
        <link rel="stylesheet" href="landingStyle.css">
    </head>
    <body>
        <div class="title-display container">
            <canvas id="code-canvas"></canvas>
            <h1 id="title">QR Code Generator</h1>
        </div>
        <div class="nav-holder container">
            <a href="./info.html">
                <button class="page-button">INFO PAGE</button>
            </a>
            <a href="./main.html">
                <button class="page-button">MAIN PAGE</button>
            </a>
        </div>

        <p id="check"><strong>IMPORTANT:</strong> Please check out the <strong>Info Page</strong></p>
    </body>
    <script src="script.js"></script>
    <script src="preGenCodes.js"></script>
    <script>
        const fonts = [
            'Georgia, serif',
            'Times New Roman, serif',
            'Arial, sans-serif',
            'Verdana, sans-serif',
            'Trebuchet MS, sans-serif',
            'Impact, Charcoal, sans-serif',
            'Courier New, monospace',
            'Lucida Console, monospace',
            'Comic Sans MS, cursive',
            'Brush Script MT, cursive',
            'Papyrus, fantasy',
            'Copperplate, fantasy'
        ];

        const title = document.getElementById("title");

        let idxOptions = [];
        for (let i=0; i<pre_gen_codes.length; i++){
            idxOptions.push(i);
        }

        let idx = idxOptions[Math.floor(idxOptions.length*Math.random())];
        idxOptions = idxOptions.filter(x => x !== idx);
        idxOptions.push(idx);

        setInterval(() => {
            code_grid = pre_gen_codes[idx];

            [red, green, blue] = [Math.floor(Math.random()*255+1), Math.floor(Math.random()*255+1), Math.floor(Math.random()*255+1)];
            zeroColor = '#'+red.toString(16).padStart(2, '0')+green.toString(16).padStart(2, '0')+blue.toString(16).padStart(2, '0');

            [red, green, blue] = [(red+127)%255, (green+127)%255, (blue+127)%255];
            oneColor = '#'+red.toString(16).padStart(2, '0')+green.toString(16).padStart(2, '0')+blue.toString(16).padStart(2, '0');

            title.style.fontFamily = fonts[Math.floor(Math.random()*fonts.length)];
            displayCode();

            idx = idxOptions[Math.floor((idxOptions.length-1)*Math.random())];
            idxOptions = idxOptions.filter(x => x !== idx);
            idxOptions.push(idx);
        }, 1000);
    </script>
</html>
