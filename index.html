<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>QR Code Generator</title>
        <link href="https://fonts.cdnfonts.com/css/oldnewspapertypes" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="title-display container">
            <canvas class="code-canvas" id="changing-code"></canvas>
            <h1 id="title"></h1>
        </div>
        <div class="nav-holder container">
            <a href="./info.html">
                <button class="page-button">INFO PAGE</button>
            </a>
            <a href="./main.html">
                <button class="page-button">MAIN PAGE</button>
            </a>
        </div>

        <p id="check"><strong>IMPORTANT:</strong> Please check out the <strong>Info Page</strong></p>
    </body>
    <script src="script.js"></script>
    <script src="preGenCodes.js"></script>
    <script>
        function changing(){
            code_grid = pre_gen_codes[codeIdx];

            [red, green, blue] = [Math.floor(Math.random()*255+1), Math.floor(Math.random()*255+1), Math.floor(Math.random()*255+1)];
            zeroColor = '#'+red.toString(16).padStart(2, '0')+green.toString(16).padStart(2, '0')+blue.toString(16).padStart(2, '0');

            [red, green, blue] = [(red+127)%255, (green+127)%255, (blue+127)%255];
            oneColor = '#'+red.toString(16).padStart(2, '0')+green.toString(16).padStart(2, '0')+blue.toString(16).padStart(2, '0');

            title.style.fontFamily = fonts[fontIdx];
            title.innerHTML = "QR Code Generator";
            displayCode();

            codeIdx = codeIdxOptions[Math.floor((codeIdxOptions.length-1)*Math.random())];
            codeIdxOptions = codeIdxOptions.filter(x => x !== codeIdx);
            codeIdxOptions.push(codeIdx);

            fontIdx = fontIdxOptions[Math.floor((fontIdxOptions.length-1)*Math.random())];
            fontIdxOptions = fontIdxOptions.filter(x => x !== fontIdx);
            fontIdxOptions.push(fontIdx);
        }

        let fonts = [
            'Georgia, serif',
            'Times New Roman, serif',
            'Arial, sans-serif',
            'Verdana, sans-serif',
            'Trebuchet MS, sans-serif',
            'Impact, Charcoal, sans-serif',
            'Courier New, monospace',
            'Lucida Console, monospace',
            'Comic Sans MS, cursive',
            'Brush Script MT, cursive',
            'Papyrus, fantasy',
            'Copperplate, fantasy'
        ];

        const title = document.getElementById("title");

        let codeIdxOptions = [];
        for (let i=0; i<pre_gen_codes.length; i++){
            codeIdxOptions.push(i);
        }

        let codeIdx = codeIdxOptions[Math.floor(codeIdxOptions.length*Math.random())];
        codeIdxOptions = codeIdxOptions.filter(x => x !== codeIdx);
        codeIdxOptions.push(codeIdx);

        let fontIdxOptions = [];
        for (let i=0; i<fonts.length; i++){
            fontIdxOptions.push(i);
        }

        let fontIdx = fontIdxOptions[Math.floor(fontIdxOptions.length*Math.random())];
        fontIdxOptions = fontIdxOptions.filter(x => x !== fontIdx);
        fontIdxOptions.push(fontIdx);

        changing();
        setInterval(() => {
            changing()
        }, 1000);
    </script>
</html>
